apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ecr-registry-credentials
  namespace: default
spec:
  refreshInterval: "6h" # Safely refreshes before the 12-hour AWS expiration
  target:
    name: ecr-registry-secret # This is the native secret your pods will use
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # This formats the AWS token perfectly for Kubernetes!
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .proxy_endpoint | replace \"https://\" \"\" }}": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf \"%s:%s\" .username .password | b64enc }}"
              }
            }
          }
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ECRAuthorizationToken
          name: ecr-token-generator