apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ssm-parameter-fetcher
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-ssm-cluster-store
    kind: ClusterSecretStore
  target:
    name: test_string
    creationPolicy: Owner
  data:
    - secretKey: test_string
      remoteRef:
        key: /kubernetesTest/TestString